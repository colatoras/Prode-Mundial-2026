<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 – USA · México · Canadá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1F2F4;
  --bg2:#FFFFFF;
  --bg3:#E8E9EC;
  --card:#FFFFFF;
  --border:#BEC2C5;
  --border2:#AAACB3;
  --cyan:#0C1237;
  --cyan2:#272D4D;
  --gold:#e8a020;
  --green:#8ED192;
  --red:#c0392b;
  --yellow:#e8a020;
  --text:#0C1237;
  --text2:#55596D;
  --text3:#757885;
  --radius:6px;
  --radius-sm:4px;
}
body{font-family:'Barlow Condensed',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;letter-spacing:.3px;font-size:15px}
.app{max-width:760px;margin:0 auto;padding:.75rem;position:relative}

/* FLAG IMAGES */
.flag{width:28px;height:19px;object-fit:cover;border-radius:2px;flex-shrink:0;border:1px solid rgba(0,0,0,.12);display:inline-block;vertical-align:middle}
.flag-sm{width:20px;height:14px;object-fit:cover;border-radius:1px;border:1px solid rgba(0,0,0,.08)}
.flag-lg{width:36px;height:24px;object-fit:cover;border-radius:2px;border:1px solid rgba(0,0,0,.12)}

/* HEADER */
.header{
  --cyan:#8ED192;--text:#FFFFFF;--text2:#AAACB3;--text3:#757885;
  background:#0C1237;border:2px solid #1a2045;border-top:4px solid #8ED192;
  border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem;
}
.header-top{background:#080D25;padding:.4rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2045;}
.header-edition{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;font-weight:400}
.header-body{padding:1rem 1.25rem .75rem}
.main-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:38px;letter-spacing:2px;color:#fff;line-height:1;text-transform:uppercase}
.main-title .accent{color:#8ED192}
.main-subtitle{font-size:11px;letter-spacing:2px;color:#AAACB3;text-transform:uppercase;margin-top:3px;margin-bottom:.75rem}

/* COUNTDOWN */
.countdown-bar{background:#080D25;border-top:1px solid #1a2045;padding:.5rem 1.25rem;display:flex;align-items:center;gap:12px}
.cd-label{font-size:10px;letter-spacing:2px;color:#757885;text-transform:uppercase}
.cd-units{display:flex;gap:6px;align-items:center}
.cd-unit{display:flex;flex-direction:column;align-items:center;background:#111840;border:1px solid #1a2045;border-radius:3px;padding:2px 6px;min-width:36px}
.cd-num{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#8ED192;line-height:1}
.cd-sub{font-size:8px;color:#757885;text-transform:uppercase;letter-spacing:1px}
.cd-sep{font-family:'Oswald',sans-serif;font-size:16px;color:#55596D;padding-bottom:6px}

/* NEXT MATCH BANNER */
.next-banner{background:var(--bg2);border:2px solid var(--border);border-left:4px solid var(--cyan);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:.75rem;display:none}
.next-banner.show{display:block}
.nb-label{font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:.5rem}
.nb-match{display:flex;align-items:center;gap:8px;margin-bottom:.5rem}
.nb-team{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:.5px;flex:1}
.nb-team.r{text-align:right}
.nb-vs{font-size:11px;color:var(--text3);letter-spacing:1px}
.nb-picks{display:flex;gap:5px;flex-wrap:wrap;margin-top:.4rem}
.nb-pick{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:3px 9px;font-size:11px}
.nb-pick.me{border-color:var(--cyan);background:rgba(12,18,55,.06)}
.nb-pick .pname{color:var(--text2)}
.nb-pick .pscore{font-family:'Oswald',sans-serif;font-size:13px;color:var(--cyan2);font-weight:700}

/* TABS */
.tabs{display:flex;gap:0;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem}
.tab{flex:1;padding:9px 4px;border:none;border-right:1px solid var(--border);cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:1px;background:transparent;color:var(--text3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;text-transform:uppercase}
.tab:last-child{border-right:none}
.tab.active{background:var(--cyan);color:#fff;font-weight:700}
.tab:hover:not(.active){background:var(--bg3);color:var(--text)}
.section{display:none}.section.active{display:block}

/* CARDS */
.card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.75rem}
.card-title{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;padding-bottom:.5rem;border-bottom:2px solid var(--border)}

/* GROUP NAV */
.group-nav{display:flex;gap:0;background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem;flex-wrap:wrap}
.gn-btn{flex:1;min-width:42px;padding:6px 4px;border:none;border-right:1px solid var(--border);cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;background:transparent;color:var(--text3);transition:all .15s;text-transform:uppercase;text-align:center}
.gn-btn:last-child{border-right:none}
.gn-btn.active{background:var(--cyan);color:#fff}
.gn-btn:hover:not(.active){background:var(--bg2);color:var(--text)}

/* MATCH ROW */
.date-block{margin-bottom:.5rem}
.date-row{
  background:#0C1237;border:2px solid #1a2045;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  padding:.35rem .75rem;font-size:10px;letter-spacing:1.5px;color:#AAACB3;text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between;border-bottom:none;
}
.match-row{
  background:var(--bg2);border:2px solid var(--border);border-top:none;
  padding:.65rem .75rem;display:grid;
  grid-template-columns:1fr auto auto auto 1fr auto;
  align-items:center;gap:8px;transition:background .15s;margin-bottom:2px;
}
.match-row:last-child{border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.match-row:hover{background:var(--bg3)}
.match-row.played{opacity:.75}
.team-cell{display:flex;align-items:center;gap:7px}
.team-cell.r{flex-direction:row-reverse;justify-content:flex-end}
.team-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sbox{width:32px;height:30px;background:var(--bg3);border:2px solid var(--border);border-radius:3px;text-align:center;color:var(--text);font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;padding:0;transition:border-color .15s}
.sbox:focus{outline:none;border-color:var(--cyan);background:#fff}
.sep{font-size:13px;color:var(--text3);text-align:center;font-family:'Oswald',sans-serif;letter-spacing:1px;font-weight:700}
.result-display{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--cyan);min-width:52px;text-align:center;letter-spacing:2px}
.venue-cell{font-size:9px;color:var(--text3);text-align:right;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.time-arg{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:.5px;white-space:nowrap;line-height:1}
.time-arg-sm{font-size:9px;font-weight:500;opacity:.6;letter-spacing:.3px}

/* PHASE TOGGLE */
.phase-toggle{display:flex;gap:0;background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem}
.pt-btn{flex:1;padding:7px 8px;border:none;border-right:1px solid var(--border);cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;background:transparent;color:var(--text3);transition:all .15s;text-transform:uppercase;font-weight:500}
.pt-btn:last-child{border-right:none}
.pt-btn.active{background:var(--cyan);color:#fff;font-weight:700}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:2px solid var(--border)}
.lb-row:last-child{border:none}
.lb-rank{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;width:30px;text-align:center;color:var(--text3)}
.lb-rank.p1{color:var(--cyan)}.lb-rank.p2{color:#757885}.lb-rank.p3{color:#b87333}
.lb-pts{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:var(--cyan);line-height:1}
.prog-track{height:3px;background:var(--border);border-radius:1px;margin-top:4px}
.prog-bar{height:3px;background:var(--cyan);border-radius:1px;transition:width .5s}

/* STANDINGS TABLE */
.standings-wrap{overflow-x:auto}
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:6px 8px;text-align:center;border-bottom:2px solid var(--border2);font-weight:700;background:var(--bg3)}
.standings-table th.left{text-align:left}
.standings-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border);font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:.3px}
.standings-table td.left{text-align:left}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr:hover td{background:var(--bg3)}
.pos-num{font-size:11px;color:var(--text3);font-weight:700}
.pos-q{color:var(--cyan)}.pos-e{color:#e8a020}.pos-r{color:var(--text3)}
.team-row-cell{display:flex;align-items:center;gap:7px}
.pts-cell{font-weight:700;color:var(--cyan)}
.dg-pos{color:#1a7a3a}.dg-neg{color:var(--red)}
.group-section{margin-bottom:1rem;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden}
.group-header{background:#0C1237;padding:.5rem .75rem;border-bottom:2px solid #1a2045;display:flex;align-items:center;justify-content:space-between}
.group-label{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;color:#8ED192;text-transform:uppercase;font-weight:700}
.group-teaser{font-size:9px;color:#757885;letter-spacing:1px}

/* POINTS BADGES */
.pts-pill{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;font-family:'Oswald',sans-serif;min-width:24px;text-align:center;letter-spacing:.5px}
.pts-3{background:rgba(26,122,58,.12);color:#1a7a3a;border:2px solid rgba(26,122,58,.3)}
.pts-1{background:rgba(12,18,55,.1);color:#0C1237;border:2px solid rgba(12,18,55,.2)}
.pts-0{background:rgba(192,57,43,.1);color:#c0392b;border:2px solid rgba(192,57,43,.25)}

/* ADMIN */
.pending-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:2px solid var(--border)}
.pending-row:last-child{border:none}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-p{background:#e8a020}.dot-a{background:#1a7a3a}
.code-tag{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:var(--cyan);background:rgba(12,18,55,.07);padding:3px 10px;border-radius:3px;letter-spacing:3px;border:2px solid rgba(12,18,55,.2)}

/* CHIPS */
.chip{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.chip-ok{background:rgba(26,122,58,.1);color:#1a7a3a;border:2px solid rgba(26,122,58,.25)}
.chip-pend{background:rgba(232,160,32,.1);color:#9a6800;border:2px solid rgba(232,160,32,.3)}

/* BRACKET */
.brk-wrap{overflow-x:auto;padding-bottom:.5rem}
.brk{display:flex;gap:3px;min-width:940px;align-items:stretch}
.brk-side{display:flex;flex:1;gap:2px}
.brk-col{display:flex;flex-direction:column;flex:1;min-width:95px}
.brk-chd{font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;text-align:center;padding:3px 2px;border-bottom:2px solid var(--border);margin-bottom:3px;font-weight:700;white-space:nowrap}
.brk-grp{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2px 0}
.brk-m{background:var(--bg3);border:2px solid var(--border);border-radius:3px;padding:3px 6px;margin:1px 0}
.brk-m.has-result{border-color:var(--cyan)}
.brk-mid{font-size:7px;color:var(--text3);letter-spacing:1px;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;line-height:1.4}
.brk-mt{font-size:10px;color:var(--text);font-family:'Oswald',sans-serif;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.brk-ms{font-size:12px;color:var(--cyan);font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:1px;text-align:center;padding:1px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:1px 0}
.brk-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:0 5px;flex-shrink:0;min-width:105px}
.brk-final-box,.brk-bronze-box{width:100%}
.brk-final-box .brk-m{border-color:var(--cyan);background:rgba(12,18,55,.06)}
.brk-bronze-box .brk-m{border-color:#b87333;background:rgba(184,115,51,.06)}
.brk-bronze-box .brk-chd{color:#b87333}

/* PICKERS VIEWER */
.pv-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.75rem}
.pv-btn{padding:5px 13px;border-radius:3px;border:2px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.pv-btn.active{background:var(--cyan);color:#fff;border-color:var(--cyan);font-weight:700}
.pv-btn:hover:not(.active){background:var(--bg3);color:var(--text)}

/* LOGIN */
.divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:10px;margin:12px 0;letter-spacing:2px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:2px;background:var(--border)}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;margin-bottom:8px;transition:border-color .15s;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.inp:focus{outline:none;border-color:var(--cyan);background:#fff}
.inp::placeholder{color:var(--text3)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;background:transparent;color:var(--text2);display:inline-flex;align-items:center;gap:6px;transition:all .15s;text-transform:uppercase}
.btn:hover{background:var(--bg3);color:var(--text)}
.btn-cyan{background:var(--cyan);color:#fff;border-color:var(--cyan);font-weight:700}
.btn-cyan:hover{background:var(--cyan2);border-color:var(--cyan2)}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--text2)}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:4px 10px;font-size:10px}

/* PBADGE */
.pbadge{display:inline-flex;align-items:center;gap:7px;background:rgba(12,18,55,.07);border:2px solid rgba(12,18,55,.15);border-radius:3px;padding:4px 10px 4px 7px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:.5px;text-transform:uppercase}
.av{width:20px;height:20px;border-radius:50%;background:var(--cyan);color:#fff;font-size:9px;font-weight:700;font-family:'Oswald',sans-serif;display:flex;align-items:center;justify-content:center}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--cyan);color:#fff;padding:9px 20px;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap;text-transform:uppercase;border:2px solid var(--cyan2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:.75rem}
.sbox2{background:var(--card);border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.sv{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:var(--cyan);line-height:1}
.sl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}

@media(max-width:500px){
  .venue-cell{display:none}
  .team-name{font-size:14px}
  .main-title{font-size:30px}
  .tabs{flex-wrap:wrap}
  .tab{min-width:33%}
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:8px">
      <img src="https://flagcdn.com/w20/us.png" class="flag-sm" alt="USA">
      <img src="https://flagcdn.com/w20/mx.png" class="flag-sm" alt="MEX">
      <img src="https://flagcdn.com/w20/ca.png" class="flag-sm" alt="CAN">
    </div>
    <div class="header-edition">FIFA World Cup 2026</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="session-badge"></div>
      <div id="sync-badge" style="font-size:9px;color:#8ED192;letter-spacing:1px;font-family:'Oswald',sans-serif">● ONLINE</div>
    </div>
  </div>
  <div class="header-body">
    <div class="main-title">MUNDIAL <span class="accent">2026</span></div>
    <div class="main-subtitle">USA · México · Canadá &nbsp;—&nbsp; Prode Oficial</div>
  </div>
  <div class="countdown-bar">
    <div class="cd-label">Inicio en</div>
    <div class="cd-units">
      <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-sub">días</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-sub">hs</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-sub">min</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-sub">seg</div></div>
    </div>
  </div>
</div>

<!-- NEXT MATCH BANNER -->
<div class="next-banner" id="next-banner"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="sw('picks')" id="tb-picks">Mis Predicciones</button>
  <button class="tab" onclick="sw('tabla')" id="tb-tabla">Tabla</button>
  <button class="tab" onclick="sw('grupos')" id="tb-grupos">Grupos</button>
  <button class="tab" onclick="sw('resultados')" id="tb-resultados">Resultados</button>
  <button class="tab" onclick="sw('bracket')" id="tb-bracket">Cuadro</button>
  <button class="tab" onclick="sw('ver')" id="tb-ver">Ver picks</button>
  <button class="tab" onclick="sw('trivia')" id="tb-trivia">Trivia</button>
</div>

<div id="tab-picks" class="section active"></div>
<div id="tab-tabla" class="section"></div>
<div id="tab-grupos" class="section"></div>
<div id="tab-resultados" class="section"></div>
<div id="tab-bracket" class="section"></div>
<div id="tab-ver" class="section"></div>
<div id="tab-trivia" class="section"></div>
<div id="tab-ingresar" class="section"></div>
<div id="tab-admin" class="section"></div>
</div>
<button id="admin-fab" onclick="sw('admin')" title="Panel de administración" style="position:fixed;bottom:20px;right:20px;background:#0C1237;color:#fff;border:2px solid #272D4D;border-radius:var(--radius);padding:7px 14px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;z-index:1000;text-transform:uppercase;box-shadow:0 3px 10px rgba(0,0,0,.2)">Admin</button>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  FLAG HELPER
// ══════════════════════════════════════════
const FLAG_CODES = {

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxdxrMOERYiRaaNqTSJO3Z5ALWn3fV2uzUgKqdr0g6PeO-wc0oYJ3YfQsIxpqHuY2V9Ow/exec';

function setSyncBadge(s){
  const el=document.getElementById('sync-badge');if(!el)return;
  if(s==='error'){
    el.style.color='#e05050';
    el.innerHTML='● ERROR <span onclick="loadData().then(()=>{rPicks&&rPicks()})" style="cursor:pointer;text-decoration:underline;font-size:9px;margin-left:4px;opacity:.8">reintentar</span>';
  }else{
    const map={loading:['#e8a020','● CARGANDO'],saving:['#8ED192','● GUARDANDO'],ok:['#8ED192','● ONLINE']};
    const [color,label]=map[s]||['#8ED192','● ONLINE'];
    el.style.color=color;el.textContent=label;
  }
}

function applyData(d){
  state.picks=d.picks||{};state.results=d.results||{};
  state.players=d.players&&d.players.length?d.players:[{name:'Marcos',code:'ADM',pts:0,exact:0,win:0}];
  if(!state.players.find(p=>p.code==='ADM'))state.players.unshift({name:'Marcos',code:'ADM',pts:0,exact:0,win:0});
  state.pending=d.pending||[];
  state.scorerPicks=d.scorerPicks||{};state.scorerResult=d.scorerResult||null;
  state.qualified=d.qualified||{};state.lockedPhases=d.lockedPhases||{};
  state.triviaPicks=d.triviaPicks||{};state.triviaResults=d.triviaResults||{};
  recalcPoints();computeResultsQualified();
}
function loadCache(){try{const c=localStorage.getItem('prode_cache');if(c)applyData(JSON.parse(c));}catch(e){}}
function saveCache(d){try{localStorage.setItem('prode_cache',JSON.stringify(d));}catch(e){}}

async function loadData(){
  setSyncBadge('loading');
  try{
    const controller=new AbortController();
    const tid=setTimeout(()=>controller.abort(),8000);
    const res=await fetch(SCRIPT_URL,{signal:controller.signal});
    clearTimeout(tid);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const d=await res.json();
    applyData(d);saveCache(d);setSyncBadge('ok');
  }catch(e){
    console.warn('Backend no disponible:',e.message);
    loadCache();setSyncBadge('error');
    toast('Sin conexión — cargando datos locales');
  }
}

async function saveData(){
  const payload={picks:state.picks,results:state.results,players:state.players,pending:state.pending,scorerPicks:state.scorerPicks,scorerResult:state.scorerResult,qualified:state.qualified,lockedPhases:state.lockedPhases,triviaPicks:state.triviaPicks,triviaResults:state.triviaResults};
  saveCache(payload);setSyncBadge('saving');
  try{
    const controller=new AbortController();
    const tid=setTimeout(()=>controller.abort(),8000);
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain;charset=utf-8'},signal:controller.signal});
    clearTimeout(tid);setSyncBadge('ok');
  }catch(e){
    console.warn('saveData falló:',e.message);
    setSyncBadge('error');toast('Guardado solo en local — sin conexión remota');
  }
}

function recalcPoints(){
  const all=[...GRUPOS_FIX.flatMap(d=>d.matches),...ELIM_FIX.flatMap(r=>r.matches)];
  state.players.forEach(p=>{
    let pts=0,exact=0,win=0;
    const pk=state.picks[p.name]||{};
    all.forEach(m=>{
      const s=getPts(pk[m.id],state.results[m.id]);
      if(s===3){pts+=3;exact++;}else if(s===1){pts+=1;win++;}
    });
    // trivia points
    const tp=state.triviaPicks[p.name]||{};
    const tr=state.triviaResults||{};
    TRIVIA_AWARDS.forEach(aw=>{const tv=(tp[aw.id]||'').trim().toLowerCase();const rv=(tr[aw.id]||'').trim().toLowerCase();if(tv&&rv&&tv===rv)pts+=aw.pts;});
    p.pts=pts;p.exact=exact;p.win=win;
  });
}

function getPts(pk,r){
  if(!pk||!r||pk.h===''||r.h==='')return null;
  const ph=+pk.h,pa=+pk.a,rh=+r.h,ra=+r.a;
  if(ph===rh&&pa===ra)return 3;
  if((ph>pa&&rh>ra)||(ph<pa&&rh<ra)||(ph===pa&&rh===ra))return 1;
  return 0;
}

// helper: parse match datetime (ARG = UTC-3); dateStr can be "Jue 11 Jun" or "Los Ángeles · 28 Jun"
function parseMatchDateTime(dateStr,timeStr){
  const MM={Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
  const clean=dateStr.includes('·')?dateStr.split('·').pop().trim():dateStr.trim();
  const parts=clean.split(/\s+/);
  let day=null,mon=null;
  for(const p of parts){if(/^\d+$/.test(p))day=parseInt(p);if(MM[p]!==undefined)mon=MM[p];}
  if(day==null||mon==null||!timeStr)return null;
  const[h,m]=timeStr.split(':').map(Number);
  // times before 06:00 belong to the next calendar day (early-morning kick-offs)
  return new Date(Date.UTC(2026,mon,day+(h<6?1:0),h+3,m));
}
function isMatchLocked(t,dateStr){
  if(!t||!dateStr)return false;
  const dt=parseMatchDateTime(dateStr,t);
  return!!(dt&&Date.now()>=dt.getTime());
}

function updateCD(){
  const diff=new Date('2026-06-11T16:00:00-03:00')-new Date();
  if(diff<=0){document.querySelector('.countdown-bar').style.display='none';return;}
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
}

function calcPickGroupStandings(g,picks){
  const teams=GROUP_DATA[g].teams;
  const matches=GRUPOS_FIX.flatMap(d=>d.matches).filter(m=>m.g===g);
  const table={};
  teams.forEach(t=>{table[t]={name:t,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0}});
  matches.forEach(m=>{
    const pk=picks[m.id];if(!pk||pk.h===''||pk.a==='')return;
    const rh=+pk.h,ra=+pk.a;
    table[m.h].pj++;table[m.a].pj++;
    table[m.h].gf+=rh;table[m.h].gc+=ra;table[m.h].dg+=rh-ra;
    table[m.a].gf+=ra;table[m.a].gc+=rh;table[m.a].dg+=ra-rh;
    if(rh>ra){table[m.h].pg++;table[m.h].pts+=3;table[m.a].pp++;}
    else if(rh<ra){table[m.a].pg++;table[m.a].pts+=3;table[m.h].pp++;}
    else{table[m.h].pe++;table[m.a].pe++;table[m.h].pts+=1;table[m.a].pts+=1;}
  });
  return Object.values(table).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

function computeMyQualified(picks){
  const out={};const thirds=[];
  Object.keys(GROUP_DATA).forEach(g=>{
    const s=calcPickGroupStandings(g,picks);
    if(s[0]&&s[0].pj>0)out['1'+g]=s[0].name;
    if(s[1]&&s[1].pj>0)out['2'+g]=s[1].name;
    if(s[2]&&s[2].pj>0)thirds.push({team:s[2].name,group:g,pts:s[2].pts,dg:s[2].dg,gf:s[2].gf});
  });
  thirds.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  const rem=[...thirds.slice(0,9)];
  const r16=ELIM_FIX.find(r=>r.round==='R16');
  r16.matches.forEach(m=>{
    ['h','a'].forEach(side=>{
      const code=m[side];
      if(code.startsWith('3°(')&&!out[code]){
        const pool=code.match(/\(([^)]+)\)/)[1].split('/');
        const idx=rem.findIndex(t=>pool.includes(t.group));
        if(idx>=0){out[code]=rem[idx].team;rem.splice(idx,1);}
      }
    });
  });
  return out;
}

function resolvePickTeam(code,picks,myQ){
  if(!code)return'?';
  if(myQ[code])return myQ[code];
  if(code.startsWith('G.')||code.startsWith('P.')){
    const mid=code.slice(2);
    const pk=picks[mid];
    if(!pk||pk.h===''||pk.a==='')return code;
    const allM=ELIM_FIX.flatMap(rd=>rd.matches);
    const m=allM.find(x=>x.id===mid);if(!m)return code;
    const hs=parseInt(pk.h),as_=parseInt(pk.a);
    if(isNaN(hs)||isNaN(as_)||hs===as_)return code;
    const winner=hs>as_?resolvePickTeam(m.h,picks,myQ):resolvePickTeam(m.a,picks,myQ);
    const loser=hs>as_?resolvePickTeam(m.a,picks,myQ):resolvePickTeam(m.h,picks,myQ);
    return code.startsWith('G.')?winner:loser;
  }
  return code;
}

function calcGroupStandings(groupLetter){
  const teams=GROUP_DATA[groupLetter].teams;
  const matches=GRUPOS_FIX.flatMap(d=>d.matches).filter(m=>m.g===groupLetter);
  const table={};
  teams.forEach(t=>{table[t]={name:t,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0}});
  matches.forEach(m=>{
    const r=state.results[m.id];if(!r||r.h==='')return;
    const rh=+r.h,ra=+r.a;
    table[m.h].pj++;table[m.a].pj++;
    table[m.h].gf+=rh;table[m.h].gc+=ra;table[m.h].dg+=rh-ra;
    table[m.a].gf+=ra;table[m.a].gc+=rh;table[m.a].dg+=ra-rh;
    if(rh>ra){table[m.h].pg++;table[m.h].pts+=3;table[m.a].pp++;}
    else if(rh<ra){table[m.a].pg++;table[m.a].pts+=3;table[m.h].pp++;}
    else{table[m.h].pe++;table[m.a].pe++;table[m.h].pts+=1;table[m.a].pts+=1;}
  });
  return Object.values(table).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

let _rq={};
function computeResultsQualified(){
  const out={};const thirds=[];
  Object.keys(GROUP_DATA).forEach(g=>{
    const s=calcGroupStandings(g);
    if(s[0]&&s[0].pj>0)out['1'+g]=s[0].name;
    if(s[1]&&s[1].pj>0)out['2'+g]=s[1].name;
    if(s[2]&&s[2].pj>0)thirds.push({team:s[2].name,group:g,pts:s[2].pts,dg:s[2].dg,gf:s[2].gf});
  });
  thirds.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  const rem=[...thirds.slice(0,9)];
  const r16=ELIM_FIX.find(r=>r.round==='R16');
  r16.matches.forEach(m=>{
    ['h','a'].forEach(side=>{
      const code=m[side];
      if(code.startsWith('3°(')&&!out[code]){
        const pool=code.match(/\(([^)]+)\)/)[1].split('/');
        const idx=rem.findIndex(t=>pool.includes(t.group));
        if(idx>=0){out[code]=rem[idx].team;rem.splice(idx,1);}
      }
    });
  });
  _rq=out;
}
function resolveTeam(code){
  if(!code)return'?';
  if(state.qualified&&state.qualified[code])return state.qualified[code];
  if(_rq[code])return _rq[code];
  if(code.startsWith('G.')||code.startsWith('P.')){
    const mid=code.slice(2);
    const r=state.results[mid];
    if(!r||r.h===''||r.h===undefined)return code;
    const allM=ELIM_FIX.flatMap(rd=>rd.matches);
    const m=allM.find(x=>x.id===mid);if(!m)return code;
    const hs=parseInt(r.h),as_=parseInt(r.a);
    if(isNaN(hs)||isNaN(as_)||hs===as_)return code;
    const winner=hs>as_?resolveTeam(m.h):resolveTeam(m.a);
    const loser=hs>as_?resolveTeam(m.a):resolveTeam(m.h);
    return code.startsWith('G.')?winner:loser;
  }
  return code;
}
function rBracket(){
  const el=document.getElementById('tab-bracket');
  function getMatch(id){for(const r of ELIM_FIX)for(const m of r.matches)if(m.id===id)return m;return null;}
  function bm(id){
    const m=getMatch(id);if(!m)return '';
    const r=state.results[id]||{};const hasR=r.h!==undefined&&r.h!=='';
    const rH=resolveTeam(m.h),rA=resolveTeam(m.a);
    const isResH=rH!==m.h,isResA=rA!==m.a;
    return `<div class="brk-m${hasR?' has-result':''}">
      <div class="brk-mid">${id}</div>
      <div class="brk-mt">${isResH?flagImg(rH,'flag-sm')+'<span style="vertical-align:middle">'+rH+'</span>':m.h}</div>
      <div class="brk-ms">${hasR?r.h+' – '+r.a:'&nbsp;'}</div>
      <div class="brk-mt">${isResA?flagImg(rA,'flag-sm')+'<span style="vertical-align:middle">'+rA+'</span>':m.a}</div>
    </div>`;
  }
  function col(ids,hdr){
    return `<div class="brk-col"><div class="brk-chd">${hdr}</div>${ids.map(id=>`<div class="brk-grp">${bm(id)}</div>`).join('')}</div>`;
  }
  el.innerHTML=`<div class="card" style="padding:.75rem">
    <div class="card-title">Cuadro de Clasificación</div>

      <div class="brk-side">

      </div>
      <div class="brk-side">
        ${col(['M102'],'SEMI')}
        ${col(['M99','M100'],'4TOS')}
        ${col(['M93','M94','M95','M96'],'8VOS')}
        ${col(['M81','M82','M83','M84','M85','M86','M87','M88'],'16VOS')}

async function syncResultsFromAPI(){
  const btn=document.getElementById('sync-auto-btn');
  if(btn){btn.disabled=true;btn.textContent='Cargando...';}
  setSyncBadge('loading');
  try{
    const res=await fetch(SCRIPT_URL+'?action=syncResults');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const lookup={};
    GRUPOS_FIX.forEach(d=>d.matches.forEach(m=>{lookup[m.h+'|'+m.a]=m.id;}));
    let count=0;
    (data.matches||[]).forEach(match=>{
      if(match.status!=='FINISHED')return;
      const home=FD_TEAM_MAP[match.homeTeam.name]||match.homeTeam.name;
      const away=FD_TEAM_MAP[match.awayTeam.name]||match.awayTeam.name;
      const id=lookup[home+'|'+away];if(!id)return;
      const sc=match.score?.fullTime;if(sc?.home==null||sc?.away==null)return;
      state.results[id]={h:String(sc.home),a:String(sc.away)};
      count++;
    });
    if(count>0){
      recalcPoints();computeResultsQualified();
      await saveData();
      toast(count+' resultado(s) actualizados ✓');
      rTabla();rGrupos();rBracket();rAdmin();
    }else{
      toast('Sin resultados nuevos disponibles');setSyncBadge('ok');
    }
  }catch(e){
    toast('Error: '+e.message);setSyncBadge('error');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Cargar Resultados Automáticos';}
  }
}

          ${aw.type==='team'?flagImg(pick,'flag-sm'):''}
          <span style="font-size:12px;font-family:'Oswald',sans-serif;flex:1;vertical-align:middle">${pick}</span>
          ${isC?`<span class="pts-pill pts-3">+${aw.pts}</span>`:result?`<span class="pts-pill pts-0">0</span>`:''}
        </div>`;
      });
      html+=`</div>`;
    }

    html+=`</div>`;
  });

  if(state.player&&!locked){
    html+=`<button class="btn btn-cyan btn-block" onclick="saveTriviaPicksNow()" style="margin-bottom:.75rem">Guardar predicciones</button>`;
  }

  el.innerHTML=html;
  // inicializar listas de equipos abiertas
  if(state.player&&!locked){
    TRIVIA_AWARDS.filter(a=>a.type==='team').forEach(a=>{if(!myPicks[a.id])filterTrivia(a.id);});
  }
}

// ══════════════════════════════════════════
//  SESSION — persistencia + timeout 15 min
// ══════════════════════════════════════════
const SESSION_TIMEOUT=15*60*1000;
function touchSession(){
  if(state.player)localStorage.setItem('prode_activity',Date.now().toString());
}
function isSessionValid(){
  const t=parseInt(localStorage.getItem('prode_activity')||'0');
  return Date.now()-t<SESSION_TIMEOUT;
}
function expireSession(){
  state.player=null;state.adminUnlocked=false;
  localStorage.removeItem('prode_player');
  localStorage.removeItem('prode_activity');
  localStorage.removeItem('prode_admin');
  renderSessionBadge();rPicks();
  toast('Sesión cerrada por inactividad');
}
['click','keydown','touchstart','scroll'].forEach(ev=>{
  document.addEventListener(ev,touchSession,{passive:true});
});
setInterval(()=>{if(state.player&&!isSessionValid())expireSession();},60000);

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
const R={picks:rPicks,tabla:rTabla,grupos:rGrupos,resultados:rResultados,bracket:rBracket,ver:rVer,trivia:rTrivia,ingresar:rIngresar,admin:rAdmin};
loadData().then(()=>{
  if(isSessionValid()){
    const saved=localStorage.getItem('prode_player');
    if(saved && state.players.find(p=>p.name===saved)) state.player=saved;
    if(localStorage.getItem('prode_admin')==='1') state.adminUnlocked=true;
    if(state.player||state.adminUnlocked) touchSession();
  }
  renderSessionBadge();rPicks();renderNextBanner();
});
</script>
